<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="assets/graduation-cap-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Behavior Tracker - ESL Learning Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/student-behavior-tracker.css">
    <link rel="stylesheet" href="css/google-drive.css">
    
</head>

<body>
    <!-- Behavior Tracker Container -->
    <div class="tracker-container">
        <div class="tracker-header">
            <h1><i class="fa-solid fa-clipboard-list"></i> Student Behavior Tracker</h1>
            <div class="controls">
                <a href="tools.html" class="btn btn-secondary"
                    style="text-decoration: none; display: inline-flex; align-items: center; gap: 8px;">
                    <i class="fa-solid fa-arrow-left"></i> Back to Tools
                </a>
                <div class="week-selector-group">
                    <select id="weekSelector" class="week-selector">
                        <option value="current">Current Week</option>
                    </select>
                </div>
                <button class="btn btn-finish" id="finishWeek"><i class="fa-solid fa-flag-checkered"></i> Finish
                    Week</button>
                <button class="btn btn-clear" id="clearAll"><i class="fa-solid fa-broom"></i> Clear All</button>
                <button class="btn btn-save" id="saveData"><i class="fa-solid fa-floppy-disk"></i> Save</button>
                <button class="btn btn-load" id="loadData"><i class="fa-solid fa-folder-open"></i> Load</button>
                <button class="btn btn-drive" id="openDrive"><i class="fa-brands fa-google-drive"></i> Drive</button>
                <input type="file" id="fileInput" accept=".json" style="display: none;">
            </div>
        </div>

        <!-- Subject Selector Bar -->
        <div class="subject-selector-bar">
            <div class="subject-selector-header">
                <i class="fa-solid fa-pen"></i> <strong>Select a subject, then click a cell to mark it:</strong>
                <span class="subject-selector-week-label">Week of <span id="currentWeek"></span></span>
            </div>
            <div class="subject-pills" id="subjectPills">
                <button class="subject-pill" data-subject="english" data-symbol="✖" data-label="English">
                    <span class="pill-symbol mark-english">✖</span> English
                </button>
                <button class="subject-pill" data-subject="math" data-symbol="∞" data-label="Math/Geometría">
                    <span class="pill-symbol mark-math">∞</span> Math
                </button>
                <button class="subject-pill" data-subject="science" data-symbol="△" data-label="Science">
                    <span class="pill-symbol mark-science">△</span> Science
                </button>
                <button class="subject-pill" data-subject="sociales" data-symbol="□" data-label="Sociales">
                    <span class="pill-symbol mark-sociales">□</span> Sociales
                </button>
                <button class="subject-pill" data-subject="lenguaje" data-symbol="L" data-label="Lenguaje">
                    <span class="pill-symbol mark-lenguaje">L</span> Lenguaje
                </button>
                <button class="subject-pill" data-subject="technology" data-symbol="#" data-label="Technology">
                    <span class="pill-symbol mark-technology">#</span> Technology
                </button>
                <button class="subject-pill" data-subject="ethics" data-symbol="ε" data-label="Ethics">
                    <span class="pill-symbol mark-ethics">ε</span> Ethics
                </button>
                <button class="subject-pill" data-subject="arts" data-symbol="✦" data-label="Arts">
                    <span class="pill-symbol mark-arts">✦</span> Arts
                </button>
                <button class="subject-pill" data-subject="ciencias" data-symbol="~" data-label="Ciencias Naturales">
                    <span class="pill-symbol mark-ciencias">~</span> Ciencias
                </button>
                <button class="subject-pill" data-subject="religion" data-symbol="◇" data-label="Religión">
                    <span class="pill-symbol mark-religion">◇</span> Religión
                </button>
                <button class="subject-pill pill-clear" data-subject="" data-symbol="" data-label="Erase">
                    <span class="pill-symbol">⌫</span> Erase
                </button>
            </div>
            <div class="status-legend-row">
                <span class="legend-label"><i class="fa-solid fa-chart-bar"></i> Status:</span>
                <span class="legend-item legend-clean"><i class="fa-solid fa-circle"></i> Clean</span>
                <span class="legend-item legend-warning"><i class="fa-solid fa-circle"></i> Warning (1)</span>
                <span class="legend-item legend-alert"><i class="fa-solid fa-circle"></i> Alert (2)</span>
                <span class="legend-item legend-danger"><i class="fa-solid fa-circle"></i> Danger (3+)</span>
                <span class="legend-item legend-completed"><i class="fa-solid fa-circle-check"></i> Completed</span>
            </div>
            <div id="debugInfo" style="margin-top: 6px; font-size: 12px; color: #95a5a6;"></div>
        </div>


        <div class="table-container">
            <table id="behaviorTable">
                <thead>
                    <tr>
                        <th class="student-name">Student Name</th>
                        <th colspan="5">Monday</th>
                        <th colspan="5">Tuesday</th>
                        <th colspan="5">Wednesday</th>
                        <th colspan="5">Thursday</th>
                        <th colspan="5">Friday</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
    </div>

    <!-- Slide-in Notification Container -->
    <div class="notification-container" id="notificationContainer"></div>

    <!-- ESL Platform Footer -->
    <footer class="main-footer">
        <div class="container">
            <p>ESL Learning Platform © 2025 | Made for Teachers, by Teachers</p>
        </div>
    </footer>

    <script src="js/students-data.js"></script>
    <script>
        // ── Subject definitions ─────────────────────────────────
        const SUBJECTS = {
            english: { symbol: '✖', cls: 'mark-english', label: 'English' },
            math: { symbol: '∞', cls: 'mark-math', label: 'Math/Geometría' },
            science: { symbol: '△', cls: 'mark-science', label: 'Science' },
            sociales: { symbol: '□', cls: 'mark-sociales', label: 'Sociales' },
            lenguaje: { symbol: 'L', cls: 'mark-lenguaje', label: 'Lenguaje' },
            technology: { symbol: '#', cls: 'mark-technology', label: 'Technology' },
            ethics: { symbol: 'ε', cls: 'mark-ethics', label: 'Ethics' },
            arts: { symbol: '✦', cls: 'mark-arts', label: 'Arts' },
            ciencias: { symbol: '~', cls: 'mark-ciencias', label: 'Ciencias Naturales' },
            religion: { symbol: '◇', cls: 'mark-religion', label: 'Religión' },
        };

        // Legacy mark mapping (for backward compat with old saved files)
        const LEGACY_MARKS = {
            'X': { symbol: '✖', cls: 'mark-english' },
            'O': { symbol: '●', cls: 'mark-circle' },
        };

        const students = studentNames;

        let selectedSubject = null; // key from SUBJECTS, or null = erase mode
        let weekCompleted = false;
        let behaviorData = {};
        let selectedWeek = null;
        let hasUnsavedData = false;

        // ── Debug log ───────────────────────────────────────────
        function debugLog(message) {
            const debugDiv = document.getElementById('debugInfo');
            const timestamp = new Date().toLocaleTimeString();
            debugDiv.innerHTML = `<strong>${timestamp}:</strong> ${message}`;
        }

        // ── Notifications ───────────────────────────────────────
        function showNotification(message, type = 'info', title = null) {
            const container = document.getElementById('notificationContainer');
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;

            let icon = '<i class="fa-solid fa-bullhorn"></i>';
            let defaultTitle = 'Notification';
            if (type === 'success') { icon = '<i class="fa-solid fa-circle-check"></i>'; defaultTitle = 'Success'; }
            else if (type === 'error') { icon = '<i class="fa-solid fa-circle-xmark"></i>'; defaultTitle = 'Error'; }
            else if (type === 'info') { icon = '<i class="fa-solid fa-circle-info"></i>'; defaultTitle = 'Info'; }

            notification.innerHTML = `
                <div class="notification-header">
                    <div class="notification-title">${icon} ${title || defaultTitle}</div>
                    <button class="notification-close" onclick="this.parentElement.parentElement.remove()">×</button>
                </div>
                <div class="notification-message">${message}</div>
            `;
            container.appendChild(notification);
            container.classList.add('show');

            setTimeout(() => {
                notification.style.opacity = '0';
                setTimeout(() => {
                    notification.remove();
                    if (container.children.length === 0) container.classList.remove('show');
                }, 300);
            }, 5000);
        }

        function showError(message, error = null) {
            console.error('[ERROR]', message, error);
            const fullMessage = error ? `${message}<br><small>Details: ${error.message}</small>` : message;
            showNotification(fullMessage, 'error', 'Error');
        }

        function showSuccess(message) { showNotification(message, 'success', 'Success'); }

        // ── Subject selector pills ──────────────────────────────
        function setupSubjectPills() {
            document.querySelectorAll('.subject-pill').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.subject-pill').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    // Erase pill has data-subject="" which we keep as empty string; subject pills have keys
                    const raw = btn.dataset.subject;
                    selectedSubject = (raw === '') ? '' : (raw || null);
                    const label = btn.dataset.label;
                    debugLog(selectedSubject !== null
                        ? (selectedSubject === '' ? 'Erase mode — click a cell to clear it' : `Selected: ${label} — click cells to mark`)
                        : 'Select a subject above');
                });
            });
        }

        // ── Data ────────────────────────────────────────────────
        function initializeBehaviorData() {
            students.forEach(student => {
                behaviorData[student] = {
                    monday1: '', monday2: '', monday3: '', monday4: '', monday5: '',
                    tuesday1: '', tuesday2: '', tuesday3: '', tuesday4: '', tuesday5: '',
                    wednesday1: '', wednesday2: '', wednesday3: '', wednesday4: '', wednesday5: '',
                    thursday1: '', thursday2: '', thursday3: '', thursday4: '', thursday5: '',
                    friday1: '', friday2: '', friday3: '', friday4: '', friday5: ''
                };
            });
        }

        function getBuildData() {
            return {
                week: getSelectedWeek(),
                savedDate: new Date().toISOString(),
                weekCompleted: weekCompleted,
                behaviorData: behaviorData
            };
        }

        // ── Week helpers ────────────────────────────────────────
        function getCurrentWeek() {
            const today = new Date();
            const monday = new Date(today);
            monday.setDate(today.getDate() - (today.getDay() === 0 ? 6 : today.getDay() - 1));
            const friday = new Date(monday);
            friday.setDate(monday.getDate() + 4);
            const opts = { month: 'short', day: 'numeric' };
            return `${monday.toLocaleDateString('en-US', opts)} - ${friday.toLocaleDateString('en-US', opts)}`;
        }

        function getSelectedWeek() {
            return (selectedWeek && selectedWeek !== 'current') ? selectedWeek : getCurrentWeek();
        }

        function generateWeekOptions() {
            const sel = document.getElementById('weekSelector');
            const cw = getCurrentWeek();
            sel.innerHTML = `<option value="current">Current Week (${cw})</option>`;

            for (let i = 1; i <= 4; i++) {
                const d = new Date(); d.setDate(d.getDate() - i * 7);
                const mon = new Date(d); mon.setDate(d.getDate() - (d.getDay() === 0 ? 6 : d.getDay() - 1));
                const fri = new Date(mon); fri.setDate(mon.getDate() + 4);
                const opts = { month: 'short', day: 'numeric' };
                const ws = `${mon.toLocaleDateString('en-US', opts)} - ${fri.toLocaleDateString('en-US', opts)}`;
                const o = document.createElement('option'); o.value = ws; o.textContent = ws;
                sel.appendChild(o);
            }
            for (let i = 1; i <= 2; i++) {
                const d = new Date(); d.setDate(d.getDate() + i * 7);
                const mon = new Date(d); mon.setDate(d.getDate() - (d.getDay() === 0 ? 6 : d.getDay() - 1));
                const fri = new Date(mon); fri.setDate(mon.getDate() + 4);
                const opts = { month: 'short', day: 'numeric' };
                const ws = `${mon.toLocaleDateString('en-US', opts)} - ${fri.toLocaleDateString('en-US', opts)}`;
                const o = document.createElement('option'); o.value = ws; o.textContent = ws;
                sel.appendChild(o);
            }
        }

        function handleWeekChange() {
            selectedWeek = document.getElementById('weekSelector').value;
            document.getElementById('currentWeek').textContent = getSelectedWeek();
            debugLog(`Week: ${getSelectedWeek()}`);
        }

        // ── Table ───────────────────────────────────────────────
        function createTable() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            const days = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday'];
            students.forEach(student => {
                const row = document.createElement('tr');
                let cells = `<td class="student-name-cell">${student}</td>`;
                days.forEach(day => {
                    for (let i = 1; i <= 5; i++) {
                        cells += `<td class="clickable-cell" data-student="${student}" data-day="${day}${i}"></td>`;
                    }
                });
                row.innerHTML = cells;
                tableBody.appendChild(row);
            });
            document.querySelectorAll('.clickable-cell').forEach(cell => {
                cell.addEventListener('click', handleCellClick);
            });
        }

        function applyMarkToCell(cell, subjectKey) {
            if (!subjectKey) {
                cell.textContent = '';
                cell.className = 'clickable-cell';
                return;
            }
            // Handle legacy 'X' and 'O' values gracefully
            if (LEGACY_MARKS[subjectKey]) {
                const m = LEGACY_MARKS[subjectKey];
                cell.textContent = m.symbol;
                cell.className = `clickable-cell has-mark ${m.cls}`;
                return;
            }
            const subj = SUBJECTS[subjectKey];
            if (subj) {
                cell.textContent = subj.symbol;
                cell.className = `clickable-cell has-mark ${subj.cls}`;
            }
        }

        function handleCellClick(event) {
            if (selectedSubject === null) {
                // Nothing selected — prompt teacher
                debugLog('⚠ Please select a subject (or Erase) first!');
                showNotification('Please select a subject or Erase from the bar above first.', 'info', 'No subject selected');
                return;
            }
            hasUnsavedData = true;
            const cell = event.currentTarget;
            const student = cell.dataset.student;
            const day = cell.dataset.day;
            const currentValue = behaviorData[student][day];

            // If same subject clicked again → toggle off (erase)
            if (selectedSubject && currentValue === selectedSubject) {
                behaviorData[student][day] = '';
                applyMarkToCell(cell, '');
            } else {
                behaviorData[student][day] = selectedSubject || '';
                applyMarkToCell(cell, selectedSubject || '');
            }
            updateRowStatus(student);
        }

        function updateRowStatus(student) {
            const row = document.querySelector(`[data-student="${student}"]`).closest('tr');
            const markCount = Object.values(behaviorData[student]).filter(m => m !== '').length;
            const wasWeekCompleted = row.classList.contains('week-completed');
            row.classList.remove('status-clean', 'status-warning', 'status-alert', 'status-danger');

            if (markCount === 0 && wasWeekCompleted) row.classList.add('status-clean', 'week-completed');
            else if (markCount === 1) { row.classList.add('status-warning'); if (wasWeekCompleted) row.classList.add('week-completed'); }
            else if (markCount === 2) { row.classList.add('status-alert'); if (wasWeekCompleted) row.classList.add('week-completed'); }
            else if (markCount >= 3) { row.classList.add('status-danger'); if (wasWeekCompleted) row.classList.add('week-completed'); }
        }

        function updateTableDisplay() {
            document.querySelectorAll('.clickable-cell').forEach(cell => {
                const student = cell.dataset.student;
                const day = cell.dataset.day;
                if (!behaviorData[student]) {
                    cell.textContent = ''; cell.className = 'clickable-cell'; return;
                }
                applyMarkToCell(cell, behaviorData[student][day]);
            });
            students.forEach(student => updateRowStatus(student));
        }

        // ── Finish week / Clear ─────────────────────────────────
        function finishWeek() {
            if (weekCompleted) {
                if (confirm('Week is already finished. Reset week status?')) {
                    weekCompleted = false;
                    document.querySelectorAll('tbody tr').forEach(row => row.classList.remove('week-completed'));
                    students.forEach(student => updateRowStatus(student));
                    document.getElementById('finishWeek').innerHTML = '<i class="fa-solid fa-flag-checkered"></i> Finish Week';
                    document.getElementById('finishWeek').style.background = '';
                    showSuccess('Week status reset');
                }
                return;
            }
            if (confirm('Mark this week as completed?')) {
                weekCompleted = true;
                let clean = 0;
                students.forEach(student => {
                    const marks = Object.values(behaviorData[student]).filter(m => m !== '');
                    const row = document.querySelector(`[data-student="${student}"]`).closest('tr');
                    row.classList.add('week-completed');
                    updateRowStatus(student);
                    if (marks.length === 0) clean++;
                });
                const btn = document.getElementById('finishWeek');
                btn.innerHTML = '<i class="fa-solid fa-circle-check"></i> Week Completed';
                btn.style.background = '#00b894';
                showSuccess(`Week completed! ${clean} students had clean records.`);
            }
        }

        function clearAllMarks() {
            if (confirm('Clear all marks and week status?')) {
                weekCompleted = false;
                initializeBehaviorData();
                document.querySelectorAll('.clickable-cell').forEach(cell => {
                    cell.textContent = ''; cell.className = 'clickable-cell';
                });
                document.querySelectorAll('tbody tr').forEach(row => row.className = '');
                document.getElementById('finishWeek').innerHTML = '<i class="fa-solid fa-flag-checkered"></i> Finish Week';
                document.getElementById('finishWeek').style.background = '';
                showSuccess('All marks cleared');
            }
        }

        // ── Save / Load (local file) ────────────────────────────
        function saveData() {
            hasUnsavedData = false;
            try {
                const data = getBuildData();
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `behavior-${getSelectedWeek().replace(/[^a-zA-Z0-9]/g, '-')}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                const btn = document.getElementById('saveData');
                const orig = btn.innerHTML;
                btn.innerHTML = '<i class="fa-solid fa-circle-check"></i> Saved!';
                setTimeout(() => { btn.innerHTML = orig; }, 2000);
                showSuccess('Data saved to file');
            } catch (error) { showError('Error saving data', error); }
        }

        function loadData() { document.getElementById('fileInput').click(); }

        function loadDataFromObject(loadedData) {
            if (!loadedData.behaviorData || !loadedData.week) { showError('Invalid file format'); return; }
            behaviorData = loadedData.behaviorData;
            weekCompleted = loadedData.weekCompleted || false;
            updateTableDisplay();
            const finishBtn = document.getElementById('finishWeek');
            if (weekCompleted) {
                finishBtn.innerHTML = '<i class="fa-solid fa-circle-check"></i> Week Completed';
                finishBtn.style.background = '#00b894';
            } else {
                finishBtn.innerHTML = '<i class="fa-solid fa-flag-checkered"></i> Finish Week';
                finishBtn.style.background = '';
            }
            showSuccess(`Data loaded from ${loadedData.week}`);
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const parsedData = JSON.parse(e.target.result);
                    if (parsedData.behaviorData && parsedData.week) {
                        if (confirm(`Load data from ${parsedData.week}?\nSaved: ${new Date(parsedData.savedDate).toLocaleDateString()}\n\nThis will replace current marks.`)) {
                            loadDataFromObject(parsedData);
                        }
                    } else { showError('Invalid file format'); }
                } catch (error) { showError('Error parsing file', error); }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // ── Initialize ──────────────────────────────────────────
        function initialize() {
            generateWeekOptions();
            document.getElementById('currentWeek').textContent = getSelectedWeek();
            initializeBehaviorData();
            createTable();
            setupSubjectPills();
            debugLog('Ready — select a subject above, then click cells to mark');
        }

        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('finishWeek').addEventListener('click', finishWeek);
            document.getElementById('clearAll').addEventListener('click', clearAllMarks);
            document.getElementById('saveData').addEventListener('click', saveData);
            document.getElementById('loadData').addEventListener('click', loadData);
            document.getElementById('weekSelector').addEventListener('change', handleWeekChange);
            document.getElementById('fileInput').addEventListener('change', handleFileSelect);

            window.addEventListener('beforeunload', function (e) {
                if (hasUnsavedData) {
                    const msg = 'You have unsaved behavior marks. Save or use Drive first.';
                    e.returnValue = msg; return msg;
                }
            });

            initialize();

            // ── Google Drive integration ────────────────────────
            const driveService = new GoogleDriveService({
                folderName: 'ESL - Behavior Tracker',
                fileExtension: '.json',
                onSave: () => getBuildData(),
                onLoad: (data) => loadDataFromObject(data),
                onNotify: (msg, type) => showNotification(msg, type === 'success' ? 'success' : type === 'error' ? 'error' : 'info')
            });

            document.getElementById('openDrive').addEventListener('click', () => {
                driveService.openModal();
                // Pre-fill filename with current week
                setTimeout(() => {
                    const inp = document.getElementById('gds-filename');
                    if (inp && !inp.value) {
                        inp.value = `behavior-${getSelectedWeek().replace(/[^a-zA-Z0-9]/g, '-')}`;
                    }
                }, 400);
            });
        });
    </script>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="js/google-drive-service.js"></script>
    <script src="js/darkmode.js"></script>
</body>

</html>
