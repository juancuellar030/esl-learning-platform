<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="assets/graduation-cap-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Student Distribution - ESL Learning Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/classroom-distribution-v2.css">
    <link rel="stylesheet" href="css/google-drive.css">
</head>

<body>
    <!-- Header -->
    <header class="main-header">
        <div class="container">
            <h1><i class="fa-solid fa-users-rectangle"></i> ESL Learning Platform</h1>
            <p class="tagline">Classroom Layout Planner</p>
        </div>
    </header>

    <!-- Navigation -->
    <nav class="main-nav">
        <div class="container">
            <a href="tools.html" class="nav-btn" style="text-decoration: none;">
                <i class="fa-solid fa-arrow-left"></i> Back to Tools
            </a>
            <div class="nav-controls" style="margin-left: auto; display: flex; gap: 10px;">
                <button id="toggle-names-btn" class="nav-btn">
                    <i class="fa-solid fa-eye-slash"></i> Hide Names
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container distribution-container">

            <!-- Toolbar -->
            <div class="toolbar">
                <div class="layout-picker">
                    <span><i class="fa-solid fa-table-cells-large"></i> Layout</span>
                    <select id="layout-preset" class="layout-picker-native" aria-hidden="true" tabindex="-1">
                        <option value="banks-1-2-2">1–2–2 Banks</option>
                        <option value="banks-2-2-1">2–2–1 Banks</option>
                        <option value="banks-2-1-2">2–1–2 Banks</option>
                        <option value="banks-1-3-1">1–3–1 Banks</option>
                        <option value="tapered-center">Tapered Center</option>
                    </select>
                    <button type="button" class="layout-picker-trigger" id="layout-preset-trigger"
                        aria-haspopup="listbox" aria-expanded="false">
                        <span class="layout-picker-preview" aria-hidden="true"></span>
                        <span class="layout-picker-label">1–2–2 Banks</span>
                        <i class="fa-solid fa-chevron-down" aria-hidden="true"></i>
                    </button>
                    <div class="layout-picker-menu" id="layout-preset-menu" role="listbox" hidden></div>
                </div>
                <button class="btn-primary" id="save-layout-btn">
                    <i class="fa-solid fa-floppy-disk"></i> Save Layout
                </button>
                <button class="btn-secondary" id="load-layout-btn">
                    <i class="fa-solid fa-folder-open"></i> Load Layout
                </button>
                <button class="btn-secondary" id="export-btn">
                    <i class="fa-solid fa-file-export"></i> Export JSON
                </button>
                <label class="btn-secondary" style="cursor: pointer;">
                    <i class="fa-solid fa-file-import"></i> Import JSON
                    <input type="file" id="import-file" accept=".json" style="display: none;">
                </label>
                <button class="drive-nav-btn" id="open-drive-btn">
                    <i class="fa-brands fa-google-drive"></i> Drive
                </button>
                <button class="btn-secondary" id="add-student-btn"
                    style="background-color: var(--tiger-orange); color: white;">
                    <i class="fa-solid fa-user-plus"></i> Add Student
                </button>
                <button class="btn-secondary" id="random-relocation-btn"
                    style="background-color: var(--medium-slate-blue); color: white;">
                    <i class="fa-solid fa-shuffle"></i> Random Relocation
                </button>
                <button class="btn-secondary" id="reset-layout-btn"
                    style="background-color: var(--cayenne-red); color: white;">
                    <i class="fa-solid fa-rotate-right"></i> Reset
                </button>
            </div>

            <!-- Classroom Grid -->
            <div class="classroom-grid-wrapper">
                <div id="classroom-grid" class="classroom-stage" aria-label="Classroom layout">
                    <!-- Board, teacher desk, and 30 numbered zones injected by JS -->
                </div>
            </div>

            <!-- Relocation Area -->
            <div id="relocation-area" class="relocation-area">
                <span class="relocation-title">Relocation Area / Waiting List</span>
                <!-- Unassigned students go here -->
            </div>

        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>ESL Learning Platform © 2025 | Made for Teachers, by Teachers</p>
        </div>
    </footer>

    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="js/students-data.js"></script>
    <script src="js/classroom-distribution-v2.js"></script>
    <script src="js/google-drive-service.js"></script>
    <script src="js/darkmode.js"></script>
    <script>
        // ── Google Drive integration for Classroom Distribution ──
        (function () {
            const STORAGE_KEY = 'classroom_layout_data';
            const driveService = new GoogleDriveService({
                folderName: 'ESL - Classroom Layouts',
                fileExtension: '.json',
                onSave: () => {
                    const data = localStorage.getItem(STORAGE_KEY);
                    return data ? JSON.parse(data) : null;
                },
                onLoad: (data) => {
                    if (!data || typeof data !== 'object') {
                        alert('Invalid layout file.'); return;
                    }
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                    location.reload();
                },
                onNotify: (msg, type) => {
                    if (typeof showNotification === 'function') { showNotification(msg); return; }
                    alert(msg);
                }
            });
            document.getElementById('open-drive-btn').addEventListener('click', () => driveService.openModal());
        })();
    </script>
</body>

</html>
